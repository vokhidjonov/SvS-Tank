<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tank Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
background:#eeeeee;
display:block;
}

footer{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
color:rgb(255, 0, 0);
font-size:14px;
}
</style>
</head>

<body>

<canvas id="game" width="900" height="550"></canvas>

<footer>
© 2026 Saidkamol Vohidjonov. All rights reserved.
</footer>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

window.addEventListener("resize",resizeCanvas)

let shootSound = new Audio("shoot.mp3")

let player,bot
let bullets=[]
let keys={}
let gameOver=false
let resultText=""
let gameState="menu"

let playerHPDisplay = 10
let botHPDisplay = 10

const maxHP = 10

let mapWidth = canvas.width
let mapHeight = canvas.height

function resizeCanvas(){

canvas.width = window.innerWidth
canvas.height = window.innerHeight

mapWidth = canvas.width
mapHeight = canvas.height

}

resizeCanvas()

let walls=[
{x:350,y:200,w:200,h:20},
{x:350,y:330,w:200,h:20},
{x:250,y:220,w:20,h:130},
{x:630,y:200,w:20,h:130}
]

let navPoints = []

function generateNavPoints(){

navPoints=[]

walls.forEach(w=>{

let offset = 40

navPoints.push({x:w.x-offset,y:w.y-offset})
navPoints.push({x:w.x+w.w+offset,y:w.y-offset})
navPoints.push({x:w.x-offset,y:w.y+w.h+offset})
navPoints.push({x:w.x+w.w+offset,y:w.y+w.h+offset})

})

}

function resetGame(){

player={x:450,y:500,size:30,angle:-Math.PI/2,hp:10}
bot={x:450,y:50,size:30,angle:Math.PI/2,hp:10}

bullets=[]
gameOver=false
resultText=""

playerHPDisplay = player.hp
botHPDisplay = bot.hp

generateNavPoints()

}

class Bullet{

constructor(x,y,dx,dy,owner){
this.x=x
this.y=y
this.dx=dx
this.dy=dy
this.r=6
this.owner=owner

this.distance=0
this.maxDistance=700
}

update(){

let speed=Math.sqrt(this.dx*this.dx + this.dy*this.dy)
this.distance+=speed

this.x+=this.dx
this.y+=this.dy

if(this.x<this.r || this.x>canvas.width-this.r) this.dx*=-1
if(this.y<this.r || this.y>canvas.height-this.r) this.dy*=-1

walls.forEach(w=>{

if(
this.x>w.x &&
this.x<w.x+w.w &&
this.y>w.y &&
this.y<w.y+w.h
){

let left=Math.abs(this.x-w.x)
let right=Math.abs(this.x-(w.x+w.w))
let top=Math.abs(this.y-w.y)
let bottom=Math.abs(this.y-(w.y+w.h))

let min=Math.min(left,right,top,bottom)

if(min===left || min===right) this.dx*=-1
else this.dy*=-1

if(this.distance>this.maxDistance){
this.dead=true
}

}

})

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,this.r,0,Math.PI*2)

if(this.owner==="player"){
ctx.fillStyle="blue"
}else{
ctx.fillStyle="orange"
}

ctx.fill()

}

}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false
})

canvas.addEventListener("mousedown",(e)=>{

let rect=canvas.getBoundingClientRect()
let mx=e.clientX-rect.left
let my=e.clientY-rect.top

// menu bo‘lsa PLAY tekshiramiz
if(gameState==="menu"){

if(
mx > canvas.width/2-100 &&
mx < canvas.width/2+100 &&
my > 300 &&
my < 370
)
{
gameState="game"
resetGame()

}

return
}

let speed=7

let dx=Math.cos(player.angle)*speed
let dy=Math.sin(player.angle)*speed

let bx=player.x+Math.cos(player.angle)*20
let by=player.y+Math.sin(player.angle)*20

bullets.push(new Bullet(bx,by,dx,dy,"player"))

shootSound.currentTime = 0
shootSound.play()

})

function wallCollision(x,y,size){

for(let w of walls){

if(
x+size/2>w.x &&
x-size/2<w.x+w.w &&
y+size/2>w.y &&
y-size/2<w.y+w.h
){
return true
}

}

return false

}

function wallBetween(x1,y1,x2,y2){

for(let w of walls){

let left = w.x
let right = w.x + w.w
let top = w.y
let bottom = w.y + w.h

if(
Math.max(x1,x2) > left &&
Math.min(x1,x2) < right &&
Math.max(y1,y2) > top &&
Math.min(y1,y2) < bottom
){
return true
}

}

return false

}

function testDirection(angle){

let testDist = 60

let tx = bot.x + Math.cos(angle)*testDist
let ty = bot.y + Math.sin(angle)*testDist

return wallCollision(tx,ty,bot.size)

}

function getBestNavPoint(){

let bestPoint=null
let bestDist=Infinity

navPoints.forEach(p=>{

if(!wallBetween(bot.x,bot.y,p.x,p.y)){

let dx=player.x-p.x
let dy=player.y-p.y
let d=Math.sqrt(dx*dx+dy*dy)

if(d<bestDist){
bestDist=d
bestPoint=p
}

}

})

return bestPoint

}

function movePlayer(){

let speed=2.5
let rotSpeed=0.05

// rotation
if(keys["a"]){
player.angle-=rotSpeed
}

if(keys["d"]){
player.angle+=rotSpeed
}

// forward / backward
let vx=0
let vy=0

if(keys["w"]){
vx=Math.cos(player.angle)*speed
vy=Math.sin(player.angle)*speed
}

if(keys["s"]){
vx=-Math.cos(player.angle)*speed
vy=-Math.sin(player.angle)*speed
}

let nx=player.x+vx
let ny=player.y+vy

// arena border
if(nx>15 && nx<canvas.width-15){
if(!wallCollision(nx,player.y,player.size)){
player.x=nx
}
}

if(ny>15 && ny<canvas.height-15){
if(!wallCollision(player.x,ny,player.size)){
player.y=ny
}
}

}

function botAI(){

if(gameOver) return

let dx = player.x - bot.x
let dy = player.y - bot.y

let distance = Math.sqrt(dx*dx + dy*dy)

let angleToPlayer = Math.atan2(dy,dx)

// devor bormi?
let blocked = wallBetween(bot.x,bot.y,player.x,player.y)

if(blocked){

let point=getBestNavPoint()

if(point){

let dx=point.x-bot.x
let dy=point.y-bot.y

bot.angle=Math.atan2(dy,dx)

}

}else{

bot.angle=angleToPlayer

}

let speed = 2.5

if(distance > 80){

let vx = Math.cos(bot.angle)*speed
let vy = Math.sin(bot.angle)*speed

let nx = bot.x + vx
let ny = bot.y + vy

if(nx>15 && nx<canvas.width-15){
if(!wallCollision(nx,bot.y,bot.size)){
bot.x = nx
}
}

if(ny>15 && ny<canvas.height-15){
if(!wallCollision(bot.x,ny,bot.size)){
bot.y = ny
}
}

}

// o‘q uzish
if(Math.random() < 0.02){

let bulletSpeed = 7

let bx = bot.x + Math.cos(bot.angle)*20
let by = bot.y + Math.sin(bot.angle)*20

let vx = Math.cos(bot.angle)*bulletSpeed
let vy = Math.sin(bot.angle)*bulletSpeed

bullets.push(new Bullet(bx,by,vx,vy,"bot"))

shootSound.currentTime = 0
shootSound.play()

}

}

function checkHit(){

bullets=bullets.filter(b=>{

if(b.owner!=="player"){

if(
b.x>player.x-15 &&
b.x<player.x+15 &&
b.y>player.y-15 &&
b.y<player.y+15
){
player.hp = Math.max(0, player.hp-1)
return false
}

}

if(b.owner!=="bot"){

if(
b.x>bot.x-15 &&
b.x<bot.x+15 &&
b.y>bot.y-15 &&
b.y<bot.y+15
){
bot.hp = Math.max(0, bot.hp-1)
return false
}

}

return true

})

}

function drawTank(tank,color){

ctx.save()

ctx.translate(tank.x,tank.y)
ctx.rotate(tank.angle)

ctx.fillStyle=color
ctx.fillRect(-15,-15,30,30)

ctx.fillStyle="black"
ctx.fillRect(0,-4,22,8)

ctx.restore()

}

function drawGrid(){

let gridSize = 100

ctx.strokeStyle = "#cccccc"
ctx.lineWidth = 1

for(let x=0; x<=canvas.width; x+=gridSize){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}

for(let y=0; y<=canvas.height; y+=gridSize){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}

}

function drawMapBorder(){

ctx.strokeStyle = "black"
ctx.lineWidth = 6

ctx.strokeRect(0,0,mapWidth,mapHeight)

}

function drawWalls(){

ctx.fillStyle="gray"

walls.forEach(w=>{
ctx.fillRect(w.x,w.y,w.w,w.h)
})

}

function getHPColor(percent){

let r = Math.floor(255*(1-percent))
let g = Math.floor(120*percent)
let b = Math.floor(255*percent)

return `rgb(${r},${g},${b})`

}

function drawHP(){

// smooth animation
playerHPDisplay += (player.hp - playerHPDisplay)*0.1
botHPDisplay += (bot.hp - botHPDisplay)*0.1

let barWidth = 300
let barHeight = 18

// PLAYER (chap)
let px = 30
let py = 30

let pPercent = Math.max(0, playerHPDisplay/maxHP)
let playerColor = getHPColor(pPercent)
let pWidth = Math.max(0, barWidth*pPercent)

ctx.fillStyle=playerColor
ctx.font="16px Arial"
ctx.textAlign="left"
ctx.fillText("PLAYER",px,py)

ctx.fillStyle="#333"
ctx.fillRect(px,py+8,barWidth,barHeight)

ctx.fillStyle=getHPColor(pPercent)
ctx.fillRect(px,py+8,pWidth,barHeight)


// BOT (o‘ng)
let bx = canvas.width - barWidth - 30
let by = 30

let bPercent = Math.max(0, botHPDisplay/maxHP)
let botColor = getHPColor(bPercent)
let bWidth = Math.max(0, barWidth*bPercent)

ctx.textAlign="right"
ctx.fillStyle=botColor
ctx.fillText("OPPONENT",canvas.width-30,by)

ctx.fillStyle="#333"
ctx.fillRect(bx,by+8,barWidth,barHeight)

ctx.fillStyle=getHPColor(bPercent)
ctx.fillRect(bx,by+8,bWidth,barHeight)

}

function drawGameOver(){

ctx.fillStyle="black"
ctx.font="40px Arial"
ctx.textAlign="center"

ctx.fillText(resultText,450,260)

ctx.font="20px Arial"
ctx.fillText("CLICK TO RESTART",450,300)

}

function drawMenu(){

ctx.fillStyle="#222"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="60px Arial"
ctx.textAlign="center"

ctx.fillText("TANK BATTLE",canvas.width/2,200)

ctx.fillStyle="green"
ctx.fillRect(canvas.width/2-100,300,200,70)

ctx.fillStyle="white"
ctx.font="30px Arial"
ctx.fillText("PLAY",canvas.width/2,345)

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(gameState==="menu"){

drawMenu()
requestAnimationFrame(gameLoop)
return

}

movePlayer()

ctx.save()

// kamera markazi
ctx.translate(canvas.width/2, canvas.height/2)

// tank qaragan tomonga qarshi aylantiramiz
ctx.rotate(-player.angle - Math.PI/2)

// mapni player markaziga siljitamiz
ctx.translate(-player.x, -player.y)

drawGrid()
drawMapBorder()
drawWalls()

drawTank(player,"green")
drawTank(bot,"red")

bullets=bullets.filter(b=>!b.dead)

bullets.forEach(b=>{
b.update()
b.draw()
})

ctx.restore()
drawHP()
botAI()
checkHit()

if(player.hp<=0 && !gameOver){

gameOver=true
resultText="YOU LOST"

}

if(bot.hp<=0 && !gameOver){

gameOver=true
resultText="YOU WON"

}

if(gameOver){
drawGameOver()
}

requestAnimationFrame(gameLoop)

}

resetGame()
gameLoop()

</script>

</body>
</html>
